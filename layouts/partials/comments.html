<div id="remark42"></div>
<script>
    var remark_config = {
        host: 'https://comments.adiendendra.com',
        site_id: 'remark',
        components: ['embed'],
        max_shown_comments: 10,
        // Cek langsung ke localStorage atau body class
        theme: document.body.className.includes("dark") ? 'dark' : 'light',
        locale: 'en',
        show_email_subscription: false,
        simple_view: true
    };
</script>

<script>
    // Script load Remark42
    !function(e,n){for(var o=0;o<e.length;o++){var r=n.createElement("script"),c=".js",d=n.head||n.body;r.async=!0,r.src=remark_config.host+"/web/"+e[o]+c,d.appendChild(r)}}(["embed"],document);
</script>

<script>
    // Fungsi untuk mengubah tema yang lebih stabil
    function updateRemark42Theme() {
        const newTheme = document.body.className.includes("dark") ? 'dark' : 'light';
        if (window.REMARK42) {
            window.REMARK42.changeTheme(newTheme);
        } else {
            // Jika REMARK42 belum siap, coba lagi dalam 500ms
            setTimeout(updateRemark42Theme, 500);
        }
    }

    // Listener khusus untuk tombol tema PaperMod
    document.getElementById("theme-toggle").addEventListener("click", () => {
        // Beri jeda sedikit agar class 'dark' sempat menempel ke body
        setTimeout(updateRemark42Theme, 100);
    });
</script>
