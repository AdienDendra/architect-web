<div id="remark42"></div>
<script>
    var remark_config = {
        host: 'https://comments.adiendendra.com',
        site_id: 'remark',
        components: ['embed'],
        max_shown_comments: 10,
        theme: document.body.className.includes("dark") ? 'dark' : 'light',
        locale: 'en',
        show_email_subscription: false,
        simple_view: true
    };

    // 1. Load Remark42 Script secara standar
    (function(c) {
        for(var i = 0; i < c.length; i++){
            var d = document, s = d.createElement('script');
            s.src = remark_config.host + '/web/' + c[i] + '.js';
            s.defer = true; // Gunakan defer agar tidak blocking
            (d.head || d.body).appendChild(s);
        }
    })(remark_config.components);
</script>

<script>
    // 2. Observer untuk memantau perubahan class pada body (Dark/Light Toggle)
    const themeObserver = new MutationObserver(() => {
        const currentTheme = document.body.className.includes("dark") ? 'dark' : 'light';
        if (window.REMARK42) {
            window.REMARK42.changeTheme(currentTheme);
        }
    });

    themeObserver.observe(document.body, { attributes: true, attributeFilter: ['class'] });
</script>

<style>
    /* Styling agar menyatu dengan PaperMod */
    #remark42 {
        width: 100%;
        margin: 30px auto 0;
    }
    /* Menghilangkan background putih paksa agar transparan */
    .remark42__container {
        background-color: transparent !important;
    }
</style>
