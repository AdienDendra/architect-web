<div id="remark42"></div>

<script>
    var remark_config = {
        host: 'https://comments.adiendendra.com',
        site_id: 'remark',
        components: ['embed'],
        max_shown_comments: 10,
        theme: document.body.className.includes("dark") ? 'dark' : 'light',
        locale: 'en',
        show_email_subscription: false,
        simple_view: true
    };

    (function(c) {
        for(var i = 0; i < c.length; i++){
            var d = document, s = d.createElement('script');
            s.src = remark_config.host + '/web/' + c[i] + '.js';
            s.defer = true;
            (d.head || d.body).appendChild(s);
        }
    })(remark_config.components);
</script>

<script>
    // Observer untuk ganti tema (Dark/Light)
    const themeObserver = new MutationObserver(() => {
        const currentTheme = document.body.className.includes("dark") ? 'dark' : 'light';
        if (window.REMARK42) {
            window.REMARK42.changeTheme(currentTheme);
        }
    });
    themeObserver.observe(document.body, { attributes: true, attributeFilter: ['class'] });
</script>

<style>
    /* PAKSA WARNA HITAM-PUTIH (MONOCHROME) */
    #remark42 {
        --remark-primary: var(--primary); /* Mengikuti warna teks utama PaperMod */
        --remark-secondary: var(--secondary);
        --remark-background: transparent;
    }

    /* Menghilangkan warna hijau bawaan Remark42 */
    .remark42__container .re-button--primary {
        background-color: var(--primary) !important;
        color: var(--theme) !important;
        border: none !important;
    }

    /* Memastikan toolbar dan list muncul kembali */
    .remark42__container .re-toolbar {
        display: flex !important;
    }

    /* Rapikan margin agar sejajar dengan konten blog */
    #remark42 {
        margin-top: 40px;
        border-top: 1px solid var(--border);
        padding-top: 20px;
    }
</style>
