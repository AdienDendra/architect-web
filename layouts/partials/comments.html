{{- if not .Params.disableShare -}}
<style>
    /* 1. Paksa background utama Isso jadi transparan agar ikut warna blog */
    #isso-thread {
        background-color: transparent !important;
        color: inherit !important;
    }

    /* 2. Tembak kotak input (Nama, Email, Website) */
    #isso-thread .auth-section input {
        background-color: rgba(255, 255, 255, 0.05) !important; /* Transparan gelap */
        color: inherit !important;
        border: 1px solid #666 !important;
        border-radius: 4px !important;
    }

    /* 3. Tembak kotak tulisan komentar utama */
    #isso-thread .textarea-wrapper .textarea {
        background-color: rgba(255, 255, 255, 0.05) !important;
        color: inherit !important;
        border: 1px solid #666 !important;
        outline: none !important;
    }

    /* 4. Perbaiki teks placeholder (tulisan bayangan di dalam kotak) */
    #isso-thread .textarea-wrapper .textarea:empty:before {
        color: #777 !important;
    }

    /* 5. Tombol Submit & Preview biar kontras */
    #isso-thread .post-action input {
        background-color: #444 !important;
        color: #fff !important;
        border: 1px solid #888 !important;
        cursor: pointer;
        padding: 5px 15px !important;
    }

    #isso-thread .post-action input:hover {
        background-color: #666 !important;
    }

    /* 6. Tulisan "No Comments Yet" */
    #isso-thread .nodata {
        color: inherit !important;
        opacity: 0.7;
    }
</style>

<style>
    /* 1. Container Utama & Font */
    #isso-thread {
        font-family: var(--common-font-family), -apple-system, sans-serif;
        color: var(--content);
        margin-top: 30px;
    }

    /* 2. Box Komentar (Textarea) */
    #isso-thread .textarea-wrapper .textarea {
        background-color: var(--code-bg) !important;
        color: var(--content) !important;
        border: 1px solid var(--border) !important;
        border-radius: var(--radius) !important;
        padding: 12px !important;
        font-size: 16px !important;
        margin-bottom: 15px !important;
    }

    /* 3. Baris Input & Tombol (Flexbox Desktop) */
    #isso-thread .postbox .auth-section {
        display: flex !important;
        flex-direction: row !important;
        flex-wrap: nowrap !important; /* Paksa satu baris di desktop */
        align-items: center !important;
        gap: 15px !important; /* Jarak antar kotak & tombol */
        width: 100% !important;
    }

    /* Hilangkan Box Website */
    #isso-thread .auth-section .input-wrapper:nth-child(3) {
        display: none !important;
    }

    /* Box Nama & Email */
    #isso-thread .auth-section .input-wrapper {
        flex: 1 !important;
    }

    #isso-thread .auth-section input {
        width: 100% !important;
        background-color: var(--code-bg) !important;
        color: var(--content) !important;
        border: 1px solid var(--border) !important;
        border-radius: var(--radius) !important;
        padding: 10px 12px !important;
        height: 42px !important;
    }

    /* Area Tombol Sejajar */
    #isso-thread .post-action {
        display: flex !important;
        gap: 10px !important;
        margin: 0 !important;
        float: none !important;
    }

    #isso-thread .post-action input {
        height: 42px !important; /* Samakan dengan tinggi input box */
        padding: 0 20px !important;
        border-radius: var(--radius) !important;
        font-weight: 600 !important;
        border: none !important;
        cursor: pointer;
        white-space: nowrap !important;
    }

    #isso-thread .post-action input[name="submit"] {
        background-color: var(--primary) !important;
        color: var(--theme) !important;
    }

    #isso-thread .post-action input[name="preview"] {
        background-color: var(--tertiary) !important;
        color: var(--content) !important;
        height: 42px !important;
    }

    /* 4. MODE HANDPHONE (Mobile) */
    @media screen and (max-width: 850px) {
        #isso-thread .postbox .auth-section {
            flex-direction: column !important;
            gap: 10px !important;
        }

        #isso-thread .auth-section .input-wrapper,
        #isso-thread .post-action {
            width: 100% !important;
        }

        #isso-thread .post-action {
            flex-direction: row !important; /* Tetap sejajar kiri-kanan di HP */
        }

        #isso-thread .post-action input {
            flex: 1 !important; /* Tombol bagi dua rata di HP */
        }
    }
</style>

<section class="comments">
    <hr>
    <h3>Comments</h3>
 
    <script data-isso="https://issocomment.adiendendra.com/"
            data-isso-css="true"
            data-isso-reply-to-self="false"
            data-isso-require-author="false"
            data-isso-require-email="false"
            data-isso-avatar="true"
            src="https://issocomment.adiendendra.com/js/embed.min.js"></script>
    
    <section id="isso-thread"></section>
</section>
{{- end -}}
