baseURL = 'https://architect.adiendendra.com/'
languageCode = 'en-us'
title = " "
theme = 'PaperMod'
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = true 
enableRobotsTXT = true

[frontmatter]
# Mengunci agar tanggal utama (Publish Date) HANYA diambil dari tulisan manual
date = [ 'date']
#  Lastmod HANYA diambil dari last commit
lastmod = ['lastmod']

# --- GLOBAL PARAMETER ---
[outputs]
    home = ["HTML", "RSS", "JSON"]

[params.assets]
    favicon = "/AD_favIcon.svg"

[params.label]
    title = " "
    icon = "images/header-menu.svg" 
    iconHeight = 32

[params]
    env = "production"
    mainSections = ["posts", "projects"]
    showFullTextLayout = true
    ShowCodeCopyButtons = true
    ShowBreadCrumbs = true
    ShowReadingTime = true
    ShowPostNavLinks = true
    ShowToc= true
    TocOpen= false
    author = "Adien Dendra"
    showFullTextInList = false
    comments = true

    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/AdienDendra"
    [[params.socialIcons]]
        name = "linkedin"
        url = "https://linkedin.com/in/adiendendra"
    [[params.socialIcons]]
        name = "email"
        url = "mailto:hello@adiendendra.com"
    [[params.socialIcons]]
        name = "cv"
        url = "/CV_ADIEN_DENDRA_2024.pdf"
    [[params.socialIcons]]
        name = "web-adien-logo"
        url = "https://adiendendra.com"    

[markup.goldmark.renderer]
  unsafe = true
  
# --- LANGUAGE CONFIGURATION ---
[languages]
    # --- ENGLISH (DEFAULT) ---
    [languages.en]
        languageName = "En"
        contentDir = "content.en"
        weight = 1
        languageCode = 'en'
        [languages.en.params]
            title = "Adien"
            description = "Creature TD & Solution Architect"
            showLastmod = true
            displayFullDate = false
            dateFormat = "2 Jan 2006, 15:04"
            [languages.en.params.profileMode]
                enabled = true
                title = " "
                subtitle = "Creature TD @ ILM | Aspiring Cloud Architect | Sydney"
                imageUrl = "https://github.com/AdienDendra.png"
                imageWidth = 120
                imageHeight = 120
                [[languages.en.params.profileMode.buttons]]
                    name = "Projects"
                    url = "/en/projects/"

        # HEADER MENU (English)
        [[languages.en.menu.main]]
            name = "Portfolio"
            url = "https://fishing.adiendendra.com/"
            weight = 1
        [[languages.en.menu.main]]
            name = "Projects"
            url = "/en/projects/"
            weight = 3
        [[languages.en.menu.main]]
            name = "Blog"
            url = "/en/posts/"
            weight = 5
#        [[languages.en.menu.main]]
#            name = "Archive"
#            url = "/en/archives/"
#            weight = 10
        [[languages.en.menu.main]]
            identifier = "search"
            name = "⌕"
            url = "/en/search/"
            weight = 15

    # --- BAHASA INDONESIA ---
    [languages.id]
        languageName = "Id"
        contentDir = "content.id"
        weight = 2
        languageCode = 'id'
        [languages.id.params]
            title = "Adien"
            description = "Creature TD & Solution Architect"
            showLastmod = true
            displayFullDate = false
            dateFormat = "2 Jan 2006, 15:04"
            [languages.id.params.profileMode]
                enabled = true
                title = " "
                subtitle = "Creature TD @ ILM | Calon Cloud Architect | Sydney"
                imageUrl = "https://github.com/AdienDendra.png"
                imageWidth = 120
                imageHeight = 120
                # pakai /id/ agar tidak balik ke English
                [[languages.id.params.profileMode.buttons]]
                    name = "Proyek"
                    url = "/id/projects/"
        [[languages.id.menu.main]]
            name = "Portofolio"
            url = "https://fishing.adiendendra.com/"
            weight = 1
        [[languages.id.menu.main]]
            name = "Proyek"
            url = "/id/projects/"
            weight = 3
        [[languages.id.menu.main]]
            name = "Blog"
            url = "/id/posts/"
            weight = 5
#        [[languages.id.menu.main]]
#            name = "Arsip"
#            url = "/id/archives/"
#            weight = 10
        [[languages.id.menu.main]]
            identifier = "search"
            name = "⌕"            
            url = "/id/search/"
            weight = 15
